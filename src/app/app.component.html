<app-notification-container></app-notification-container>
<app-confirm-container></app-confirm-container>

<nav class="navbar no-print">
  <div class="nav-logo">Picantería Web</div>
  
  <ul class="nav-links">
    <!-- Público: Todos pueden ver el mapa (ocupación) -->
    <li>
      <a routerLink="/mesas" routerLinkActive="active">Mapa de Mesas</a>
    </li>
    
    <!-- Staff: Monitor Cocina -->
    <li *ngIf="isLogged && (isAdmin || isCocinero)">
      <a routerLink="/cocina" routerLinkActive="active" style="color: #f1c40f;">Monitor Cocina</a>
    </li>

    <!-- Solo Admins: QR y Usuarios -->
    <li *ngIf="isLogged && isAdmin">
      <a routerLink="/admin/qr" routerLinkActive="active" style="color: #e67e22;">📱 Códigos QR</a>
    </li>
    <li *ngIf="isLogged && isAdmin">
      <a routerLink="/admin/usuarios" routerLinkActive="active" style="color: #3498db;">👥 Usuarios</a>
    </li>

    <!-- Botón de Salir (Solo si está logueado p.ej. personal) -->
    <li *ngIf="isLogged">
      <a href="javascript:void(0)" (click)="onLogOut()" style="color: #ff5252;">Cerrar Sesión</a>
    </li>

    <!-- Login (Solo si no está logueado, opcional si quieres que personal entre fácil) -->
    <li *ngIf="!isLogged">
      <a routerLink="/login" style="color: #48c78e;">Entrar (Staff)</a>
    </li>
  </ul>
</nav>

<div class="main-content">
  <router-outlet></router-outlet>
</div>
