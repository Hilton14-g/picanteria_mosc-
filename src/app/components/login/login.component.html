<div class="login-container">
  <div class="login-card">
    <div class="brand-section">
      <div class="logo">👨‍🍳</div>
      <h2>Picantería Web</h2>
      <p>Acceso al Sistema</p>
    </div>

    <form (ngSubmit)="onLogin()" #f="ngForm" class="login-form">
      <div class="form-group">
        <label for="username">Usuario o Correo</label>
        <div class="input-wrapper">
          <span class="icon">👤</span>
          <input type="text" id="username" name="username" [(ngModel)]="loginUsuario.username" required placeholder="Usuario o correo">
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-wrapper">
          <span class="icon">🔒</span>
          <input [type]="mostrarPassword ? 'text' : 'password'" id="password" name="password" [(ngModel)]="loginUsuario.password" required placeholder="Tu contraseña">
          <button type="button" class="btn-toggle-password" (click)="togglePassword()">
            <span class="material-symbols-outlined">
              {{ mostrarPassword ? 'visibility' : 'visibility_off' }}
            </span>
          </button>
        </div>
      </div>

      <div class="error-msg" *ngIf="errorMessage">
        ⚠️ {{ errorMessage }}
      </div>

      <div class="form-options">
        <label class="checkbox-container">
          <input type="checkbox" name="recordarme" [(ngModel)]="recordarme">
          <span class="checkmark"></span>
          Recordarme
        </label>
        <span class="forgot-password" (click)="mostrarRecuperacion()" style="cursor: pointer;">
  ¿Olvidaste tu contraseña?
</span>
      </div>

      <button type="submit" class="btn-login" [disabled]="!f.valid">
        Ingresar al Sistema
      </button>
    </form>

    <div class="modal-overlay" *ngIf="mostrarModalRecuperacion" (click)="cerrarModalRecuperacion()">
      <div class="modal-content" (click)="$event.stopPropagation()">
        <div class="modal-header">
          <h3>🔐 Recuperar Contraseña</h3>
          <button class="btn-close" (click)="cerrarModalRecuperacion()">✕</button>
        </div>
        <div class="modal-body">
          <p>Ingresa tus datos para recuperar el acceso:</p>
          <div class="form-group">
            <input type="text" name="recuperacionEmail" [(ngModel)]="recuperacionEmail" placeholder="correo@ejemplo.com">
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-cancelar" (click)="cerrarModalRecuperacion()">Cancelar</button>
          <button class="btn-recuperar" (click)="enviarRecuperacion()">Enviar</button>
        </div>
      </div>
    </div>
  </div>
</div>
