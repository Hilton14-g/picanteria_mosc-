<div class="register-container">
  <div class="register-card">
    <div class="brand-section">
      <div class="logo">👨‍🍳</div>
      <h2>Picantería Web</h2>
      <p>Crear Nueva Cuenta</p>
    </div>

    <form (ngSubmit)="onRegister()" #f="ngForm" class="register-form">
      <div class="form-group">
        <label for="username">Nombre de Usuario</label>
        <div class="input-wrapper">
          <span class="icon">👤</span>
          <input 
            type="text" 
            id="username" 
            name="username" 
            [(ngModel)]="registerData.username" 
            required 
            placeholder="Tu nombre de usuario">
        </div>
      </div>

      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <div class="input-wrapper">
          <span class="icon">📧</span>
          <input 
            type="email" 
            id="email" 
            name="email" 
            [(ngModel)]="registerData.email" 
            required 
            placeholder="tu@correo.com">
        </div>
      </div>

      <div class="form-group">
        <label for="rol">Rol</label>
        <div class="input-wrapper">
          <span class="icon">👔</span>
          <select 
            id="rol" 
            name="rol" 
            [(ngModel)]="registerData.rol" 
            required>
            <option *ngFor="let role of roles" [value]="role.value">
              {{ role.label }}
            </option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-wrapper">
          <span class="icon">🔒</span>
          <input 
            type="password" 
            id="password" 
            name="password" 
            [(ngModel)]="registerData.password" 
            required 
            placeholder="Tu contraseña (mínimo 6 caracteres)">
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmar Contraseña</label>
        <div class="input-wrapper">
          <span class="icon">🔒</span>
          <input 
            type="password" 
            id="confirmPassword" 
            name="confirmPassword" 
            [(ngModel)]="registerData.confirmPassword" 
            required 
            placeholder="Repite tu contraseña">
        </div>
      </div>

      <div class="success-msg" *ngIf="successMessage">
        {{ successMessage }}
      </div>

      <div class="error-msg" *ngIf="errorMessage">
        ⚠️ {{ errorMessage }}
      </div>

      <button type="submit" class="btn-register" [disabled]="!f.valid || loading">
        {{ loading ? 'Creando Cuenta...' : 'Crear Cuenta' }}
      </button>
    </form>

    <div class="login-link">
      <p>¿Ya tienes una cuenta?</p>
      <button type="button" class="btn-link" (click)="goToLogin()">
        Iniciar Sesión
      </button>
    </div>
  </div>
</div>
